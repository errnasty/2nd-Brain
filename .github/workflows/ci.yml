name: CI

# Type-check + tests on every push/PR. Catches the class of errors that
# repeatedly broke the Netlify build (illegal route exports, client bundle
# pulling server-only modules, type drift) in ~30s before deploy.

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci --legacy-peer-deps
      - name: Type-check
        run: npx tsc --noEmit
      - name: Lint
        run: npm run lint
      - name: Unit tests
        run: npm test

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci --legacy-peer-deps
      - name: Build (placeholder env — unauthenticated surface only)
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: dummy
          DATABASE_URL: postgresql://x:x@localhost:5432/x
      - name: Install Chromium
        run: npx playwright install --with-deps chromium
      - name: E2E smoke
        run: npm run test:e2e
