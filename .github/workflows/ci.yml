name: CI

# Type-check + tests on every push/PR. Catches the class of errors that
# repeatedly broke the Netlify build (illegal route exports, client bundle
# pulling server-only modules, type drift) in ~30s before deploy.

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci --legacy-peer-deps
      - name: Type-check
        run: npx tsc --noEmit
      - name: Unit tests
        run: npm test
